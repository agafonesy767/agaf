<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Загрузка Agaf-City</title>
    <style>
        /* Custom Font for that 'Server' look */
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap');

        /* RESET & CORE LAYOUT */
        * {
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Prevent scrollbars */
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: #050505;
            color: #22c55e;
            position: relative;
        }

        /* WRAPPER FOR CENTERING */
        /* Using absolute positioning + flex is very robust for GMod */
        #main-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        /* Technical Grid Background */
        .bg-grid {
            background-image: 
                linear-gradient(rgba(34, 197, 94, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(34, 197, 94, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
        }

        /* The Moving Line Animation (Scanner) */
        .scanner-container {
            position: relative;
            width: 80%; /* Responsive width */
            max-width: 600px;
            height: 10px;
            background: #111;
            border: 2px solid #15803d; 
            overflow: hidden;
            margin: 20px 0;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .scanner-bar {
            width: 30%; 
            height: 100%;
            background: #22c55e;
            position: absolute;
            animation: scan 2s ease-in-out infinite alternate;
        }

        @keyframes scan {
            0% { left: 0; }
            100% { left: 70%; }
        }

        /* Typography overrides to ensure visibility without Tailwind */
        h1.server-title {
            font-size: 4rem; /* Fallback size */
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-align: center;
            line-height: 1.1;
        }

        h2.server-subtitle {
            font-size: 1.5rem;
            color: #15803d;
            margin-top: 10px;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
        }

        .status-text {
            display: flex;
            justify-content: space-between;
            width: 80%;
            max-width: 600px;
            font-size: 0.8rem;
            color: #166534;
            font-weight: bold;
            text-transform: uppercase;
        }

        .loading-text-container {
            margin-top: 40px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .loading-message {
            font-size: 1.5rem;
            font-weight: bold;
            color: #4ade80;
        }

        /* Blinking cursor */
        .cursor {
            display: inline-block;
            width: 12px;
            height: 1.5rem;
            background-color: #22c55e;
            margin-left: 5px;
            animation: blink 1s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        
        /* Footer styling */
        .footer {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            color: #14532d;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
        }

        /* Mobile adjustment just in case */
        @media (max-width: 768px) {
            h1.server-title { font-size: 2.5rem; }
            h2.server-subtitle { font-size: 1rem; }
            .loading-message { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>

    <div id="main-wrapper">
        <!-- Header -->
        <h1 class="server-title text-green-500">AGAF-CITY</h1>
        <h2 class="server-subtitle">Garry's Mod Server</h2>

        <!-- Status Top -->
        <div class="status-text" style="margin-bottom: 5px;">
            <span>System: Online</span>
            <span>Connection: Stable</span>
        </div>

        <!-- Scanner -->
        <div class="scanner-container">
            <div class="scanner-bar"></div>
        </div>

        <!-- Status Bottom -->
        <div class="status-text" style="margin-top: 5px;">
            <span>Data Stream</span>
            <span>Port: 27015</span>
        </div>

        <!-- Loading Text -->
        <div class="loading-text-container">
            <p class="loading-message">
                > <span id="loading-text">Инициализация...</span><span class="cursor"></span>
            </p>
        </div>

        <!-- Footer -->
        <div class="footer">
            Добро пожаловать в город | Приятной игры
        </div>
    </div>

    <script>
        // Array of funny/GMod themed phrases
        const phrases = [
            "Загрузка приколов...",
            "Генерация плюх...",
            "Синхронизация с Agaf-City...",
            "Ищем админов в текстурах...",
            "Компиляция мемов...",
            "Распаковка энтити...",
            "Установка пропов...",
            "Настройка физики (ломаем кости)...",
            "Загрузка крутых аддонов...",
            "Почти готово, жди...",
            "Завариваем доширак...",
            "Оптимизация FPS...",
            "Проверка на наличие читов...",
            "Подгрузка карты...",
            "Соединение с базой данных...",
            "Раздача привилегий (нет)..."
        ];

        const textElement = document.getElementById('loading-text');
        let currentIndex = 0;

        function updateText() {
            // Fade out effect approach manually or just swap text
            // Since we want it technical, let's just swap it immediately or type it out.
            // Let's do a simple swap for stability.
            
            textElement.innerText = phrases[currentIndex];
            currentIndex = (currentIndex + 1) % phrases.length;
        }

        // Change text every 2.5 seconds
        setInterval(updateText, 2500);

        // Initial set
        updateText();
    </script>
</body>
</html>
